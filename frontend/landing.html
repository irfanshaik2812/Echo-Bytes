<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO BYTES – College Radio Announcement Platform</title>
  <meta name="description" content="ECHO BYTES: The College Radio Announcement Platform. Delivering campus announcements in real time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body class="landing-page">

  <!-- Particle canvas -->
  <canvas id="landing-canvas" aria-hidden="true"></canvas>

  <!-- Ambient glow orbs -->
  <div class="landing-orbs" aria-hidden="true">
    <div class="l-orb l-orb-1"></div>
    <div class="l-orb l-orb-2"></div>
    <div class="l-orb l-orb-3"></div>
  </div>

  <!-- Main content -->
  <main class="landing-content">

    <!-- Animated signal bars -->
    <div class="landing-signal" aria-hidden="true">
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
      <div class="l-bar"></div>
    </div>

    <!-- Logo image -->
    <div class="landing-logo-wrap">
      <img src="/assets/logo.png" alt="ECHO BYTES Logo" class="landing-logo-img">
    </div>

    <!-- Letter-by-letter title animation -->
    <div class="landing-title-wrap">
      <h1 class="landing-title" aria-label="ECHO BYTES">
        <!-- E C H O -->
        <span class="lt-letter" style="--i:0">E</span>
        <span class="lt-letter" style="--i:1">C</span>
        <span class="lt-letter" style="--i:2">H</span>
        <span class="lt-letter" style="--i:3">O</span>
        <!-- space -->
        <span class="lt-space" aria-hidden="true">&nbsp;</span>
        <!-- B Y T E S -->
        <span class="lt-letter lt-bytes" style="--i:4">B</span>
        <span class="lt-letter lt-bytes" style="--i:5">Y</span>
        <span class="lt-letter lt-bytes" style="--i:6">T</span>
        <span class="lt-letter lt-bytes" style="--i:7">E</span>
        <span class="lt-letter lt-bytes" style="--i:8">S</span>
      </h1>
    </div>

    <!-- Tagline -->
    <p class="landing-tagline">College Radio Announcement Platform</p>

    <!-- ENTER button -->
    <div class="landing-btn-wrap">
      <span class="enter-ring"       aria-hidden="true"></span>
      <span class="enter-ring enter-ring-2" aria-hidden="true"></span>
      <a href="/index.html"
         class="landing-enter-btn"
         id="landing-enter-btn"
         role="button"
         aria-label="Enter ECHO BYTES platform">
        <span class="enter-btn-label">ENTER</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>

  </main>

  <!-- Footer -->
  <footer class="landing-footer">Made by SHAIK IRFAN</footer>

  <script src="/js/landing.js"></script>
</body>
</html>
