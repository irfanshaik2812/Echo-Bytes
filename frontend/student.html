<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECHO BYTES – Student Dashboard</title>
  <meta name="description" content="ECHO BYTES Student Dashboard – View college announcements, filter by category, and get notified in real time.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/student.css">
</head>
<body class="student-layout">

  <!-- ═══ HEADER ═══════════════════════════════════════════ -->
  <header class="student-header">
    <div class="student-logo">
      <img src="/assets/logo.png" alt="ECHO BYTES" class="header-logo-img">
    </div>
    <div class="student-header-right">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light mode">
        <svg id="ti-sun" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="ti-moon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="theme-label">Dark Mode</span>
      </button>

      <!-- Notification Bell -->
      <div class="notif-bell-wrap">
        <button class="notif-bell" id="notif-bell" onclick="toggleNotifDropdown()" aria-label="Notifications" aria-haspopup="true" aria-expanded="false">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-badge hidden" id="notif-badge">0</span>
        </button>

        <!-- Notification Dropdown -->
        <div class="notif-dropdown hidden" id="notif-dropdown" role="dialog" aria-label="Notifications">
          <div class="notif-dropdown-header">
            <span class="notif-dropdown-title">Notifications</span>
            <button class="btn btn-ghost btn-xs" onclick="markAllNotifRead()" id="mark-all-read-btn">Mark all read</button>
          </div>
          <div class="notif-list" id="notif-list">
            <div class="notif-empty">No notifications yet</div>
          </div>
        </div>
      </div>

      <div class="student-user-pill">
        <div class="student-user-avatar" id="user-avatar">S</div>
        <span id="user-name">Student</span>
      </div>

      <button class="btn btn-ghost btn-sm" onclick="logout()" title="Sign out">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══ NAV ════════════════════════════════════════════════ -->
  <nav class="student-nav" aria-label="Student navigation">
    <button class="student-nav-item active" data-panel="feed" onclick="showStudentPanel('feed')">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Announcements
    </button>
    <button class="student-nav-item" data-panel="hidden" onclick="showStudentPanel('hidden')">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      Hidden
    </button>
  </nav>

  <!-- ═══ BODY ═══════════════════════════════════════════════ -->
  <div class="student-body">

    <!-- ─── FEED PANEL ─────────────────────────────────────── -->
    <section id="panel-feed" class="student-panel active" aria-labelledby="feed-title">
      <div class="panel-header-row">
        <h1 class="panel-title-s" id="feed-title">Announcements</h1>
      </div>

      <!-- Category filter chips -->
      <div class="category-bar" id="category-bar" role="group" aria-label="Filter by category">
        <button class="cat-chip active" data-cat="All" onclick="filterCategory('All')">All</button>
        <button class="cat-chip" data-cat="General"  onclick="filterCategory('General')">General</button>
        <button class="cat-chip" data-cat="Academic" onclick="filterCategory('Academic')">Academic</button>
        <button class="cat-chip" data-cat="Events"   onclick="filterCategory('Events')">Events</button>
        <button class="cat-chip" data-cat="Sports"   onclick="filterCategory('Sports')">Sports</button>
        <button class="cat-chip" data-cat="Cultural" onclick="filterCategory('Cultural')">Cultural</button>
        <button class="cat-chip" data-cat="Urgent"   onclick="filterCategory('Urgent')">Urgent</button>
      </div>

      <div class="ann-feed" id="ann-feed">
        <div class="empty-state">
          <span class="empty-icon">📻</span>
          <h3>Loading announcements…</h3>
        </div>
      </div>
    </section>

    <!-- ─── HIDDEN PANEL ───────────────────────────────────── -->
    <section id="panel-hidden" class="student-panel" aria-labelledby="hidden-title">
      <div class="panel-header-row">
        <h1 class="panel-title-s" id="hidden-title">Hidden Announcements</h1>
      </div>
      <div id="hidden-feed" class="hidden-feed">
        <div class="empty-state">
          <span class="empty-icon">🙈</span>
          <h3>Nothing hidden</h3>
          <p>Announcements you hide will appear here</p>
        </div>
      </div>
    </section>

  </div><!-- /student-body -->

  <footer class="page-footer">Made by SHAIK IRFAN</footer>
  <div id="toast-container" aria-live="polite"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/student.js"></script>
</body>
</html>
